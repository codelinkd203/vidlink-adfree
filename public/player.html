<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidLink Player</title>
<link rel="stylesheet" href="/player.css">
</head>
<body>
<div id="player">

  <video id="vid" preload="auto"></video>
  <div id="caption-overlay" class="caption-overlay" aria-live="polite"></div>

  <div class="grad-bottom"></div>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-poster"></div>
    <div class="loader-tint">
      <div class="loader-row">
        <div class="spinner">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        </div>
        <div class="loader-text">Fetching Data, Please Wait....</div>
      </div>
    </div>
  </div>

  <!-- SKIP FLASH (Replay10 / Forward10, accurate Material icon paths) -->
  <div class="skf l" id="skl">
    <svg viewBox="0 0 24 24" fill="#fff">
      <path d="M12,5V1L7,6l5,5V7c3.31,0,6,2.69,6,6s-2.69,6-6,6s-6-2.69-6-6H4c0,4.42,3.58,8,8,8s8-3.58,8-8S16.42,5,12,5z"/>
      <path d="M9.79,13.99h0.79V10h-0.65L9,10.32v0.66l0.79-0.21V13.99z"/>
      <path d="M13.45,11.16c0-0.32,0.05-0.55,0.14-0.68s0.24-0.2,0.41-0.2c0.17,0,0.31,0.07,0.4,0.2s0.14,0.36,0.14,0.68v1.67c0,0.32-0.05,0.55-0.14,0.68s-0.23,0.2-0.4,0.2c-0.17,0-0.31-0.07-0.41-0.2s-0.14-0.36-0.14-0.68V11.16z M12.7,12.83c0,0.47,0.11,0.85,0.34,1.12s0.54,0.41,0.95,0.41c0.41,0,0.73-0.14,0.95-0.41s0.34-0.65,0.34-1.12v-1.69c0-0.47-0.11-0.85-0.34-1.12s-0.54-0.41-0.95-0.41c-0.41,0-0.73,0.14-0.95,0.41s-0.34,0.65-0.34,1.12V12.83z"/>
    </svg>
  </div>
  <div class="skf r" id="skr">
    <svg viewBox="0 0 24 24" fill="#fff">
      <path d="M12,5V1l5,5l-5,5V7c-3.31,0-6,2.69-6,6s2.69,6,6,6s6-2.69,6-6h2c0,4.42-3.58,8-8,8s-8-3.58-8-8S7.58,5,12,5z"/>
      <path d="M9.79,13.99h0.79V10h-0.65L9,10.32v0.66l0.79-0.21V13.99z"/>
      <path d="M13.45,11.16c0-0.32,0.05-0.55,0.14-0.68s0.24-0.2,0.41-0.2c0.17,0,0.31,0.07,0.4,0.2s0.14,0.36,0.14,0.68v1.67c0,0.32-0.05,0.55-0.14,0.68s-0.23,0.2-0.4,0.2c-0.17,0-0.31-0.07-0.41-0.2s-0.14-0.36-0.14-0.68V11.16z M12.7,12.83c0,0.47,0.11,0.85,0.34,1.12s0.54,0.41,0.95,0.41c0.41,0,0.73-0.14,0.95-0.41s0.34-0.65,0.34-1.12v-1.69c0-0.47-0.11-0.85-0.34-1.12s-0.54-0.41-0.95-0.41c-0.41,0-0.73,0.14-0.95,0.41s-0.34,0.65-0.34,1.12V12.83z"/>
    </svg>
  </div>

  <!-- CENTER TRANSPORT -->
  <div id="center-ctrl">
    <button class="cc-btn skip" onclick="doSkip(-10,event)">
      <svg viewBox="0 0 24 24" fill="#fff">
        <path d="M12,5V1L7,6l5,5V7c3.31,0,6,2.69,6,6s-2.69,6-6,6s-6-2.69-6-6H4c0,4.42,3.58,8,8,8s8-3.58,8-8S16.42,5,12,5z"/>
        <path d="M9.79,13.99h0.79V10h-0.65L9,10.32v0.66l0.79-0.21V13.99z"/>
        <path d="M13.45,11.16c0-0.32,0.05-0.55,0.14-0.68s0.24-0.2,0.41-0.2c0.17,0,0.31,0.07,0.4,0.2s0.14,0.36,0.14,0.68v1.67c0,0.32-0.05,0.55-0.14,0.68s-0.23,0.2-0.4,0.2c-0.17,0-0.31-0.07-0.41-0.2s-0.14-0.36-0.14-0.68V11.16z M12.7,12.83c0,0.47,0.11,0.85,0.34,1.12s0.54,0.41,0.95,0.41c0.41,0,0.73-0.14,0.95-0.41s0.34-0.65,0.34-1.12v-1.69c0-0.47-0.11-0.85-0.34-1.12s-0.54-0.41-0.95-0.41c-0.41,0-0.73,0.14-0.95,0.41s-0.34,0.65-0.34,1.12V12.83z"/>
      </svg>
    </button>
    <button class="cc-btn play" id="center-play" onclick="togPlay(event)">
      <svg viewBox="0 0 24 24" id="center-icon"><path d="M8,5v14l11-7L8,5z"/></svg>
    </button>
    <button class="cc-btn skip" onclick="doSkip(10,event)">
      <svg viewBox="0 0 24 24" fill="#fff">
        <path d="M12,5V1l5,5l-5,5V7c-3.31,0-6,2.69-6,6s2.69,6,6,6s6-2.69,6-6h2c0,4.42-3.58,8-8,8s-8-3.58-8-8S7.58,5,12,5z"/>
        <path d="M9.79,13.99h0.79V10h-0.65L9,10.32v0.66l0.79-0.21V13.99z"/>
        <path d="M13.45,11.16c0-0.32,0.05-0.55,0.14-0.68s0.24-0.2,0.41-0.2c0.17,0,0.31,0.07,0.4,0.2s0.14,0.36,0.14,0.68v1.67c0,0.32-0.05,0.55-0.14,0.68s-0.23,0.2-0.4,0.2c-0.17,0-0.31-0.07-0.41-0.2s-0.14-0.36-0.14-0.68V11.16z M12.7,12.83c0,0.47,0.11,0.85,0.34,1.12s0.54,0.41,0.95,0.41c0.41,0,0.73-0.14,0.95-0.41s0.34-0.65,0.34-1.12v-1.69c0-0.47-0.11-0.85-0.34-1.12s-0.54-0.41-0.95-0.41c-0.41,0-0.73,0.14-0.95,0.41s-0.34,0.65-0.34,1.12V12.83z"/>
      </svg>
    </button>
  </div>

  <!-- SETTINGS: MAIN -->
  <div class="panel" id="settings-main">
    <div class="prow" onclick="openPanel('sub-quality')">
      <div class="picon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7l2.5-3.5h3L6 7"/><path d="M9 7l2.5-3.5h3L12 7"/><path d="M15 7l2.5-3.5h2.5L18 7"/>
          <rect x="3" y="7" width="18" height="13" rx="1.5"/>
        </svg>
      </div>
      <span class="plabel">Quality</span>
      <span class="pval" id="qual-val">Loading...</span>
      <svg class="pchev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <div class="prow" onclick="openPanel('sub-captions')">
      <div class="picon"><svg class="icon-cc" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/><text x="12" y="15" font-size="7.5" font-weight="700" fill="currentColor" text-anchor="middle" font-family="Arial,sans-serif">CC</text></svg></div>
      <span class="plabel">Captions</span>
      <span class="pval" id="cap-val">Off</span>
      <svg class="pchev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <div class="prow" onclick="openPanel('sub-playback')">
      <div class="picon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9.5"/><polyline points="12 7 12 12 16 14"/></svg></div>
      <span class="plabel">Playback</span>
      <span class="pval" id="speed-val">Normal</span>
      <svg class="pchev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>

  <!-- SUB: CAPTIONS -->
  <div class="panel" id="sub-captions">
    <div class="back-row" onclick="openPanel('settings-main')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Captions
    </div>
  </div>

  <!-- SUB: QUALITY -->
  <div class="panel" id="sub-quality">
    <div class="back-row" onclick="openPanel('settings-main')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Quality
    </div>
  </div>

  <!-- SUB: PLAYBACK SPEED -->
  <div class="panel" id="sub-playback">
    <div class="back-row" onclick="openPanel('settings-main')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Playback Speed
    </div>
    <div class="rrow" onclick="pickRadio(this,'speed-val','0.5x',false,0.5)"><div class="radio"><div class="radio-dot"></div></div>0.5x</div>
    <div class="rrow" onclick="pickRadio(this,'speed-val','0.75x',false,0.75)"><div class="radio"><div class="radio-dot"></div></div>0.75x</div>
    <div class="rrow selected" onclick="pickRadio(this,'speed-val','Normal',false,1)"><div class="radio"><div class="radio-dot"></div></div>Normal</div>
    <div class="rrow" onclick="pickRadio(this,'speed-val','1.25x',false,1.25)"><div class="radio"><div class="radio-dot"></div></div>1.25x</div>
    <div class="rrow" onclick="pickRadio(this,'speed-val','1.5x',false,1.5)"><div class="radio"><div class="radio-dot"></div></div>1.5x</div>
    <div class="rrow" onclick="pickRadio(this,'speed-val','2x',false,2)"><div class="radio"><div class="radio-dot"></div></div>2x</div>
  </div>

  <!-- BOTTOM CONTROLS -->
  <div id="controls">
    <div id="pw">
      <div id="pt"><div id="pbuf"></div><div id="pf"></div></div>
      <div id="pth"></div>
    </div>
    <div id="cr">
      <div class="cl">
        <button class="cb" id="play-btn" onclick="togPlay(event)">
          <svg viewBox="0 0 24 24" id="play-icon" fill="#fff"><path d="M8,5v14l11-7L8,5z"/></svg>
        </button>
        <div class="vg">
          <button class="cb" id="mute-btn" onclick="togMute(event)">
            <svg viewBox="0 0 24 24" id="vol-icon" fill="#fff"><path d="M3,9v6h4l5,5V4L7,9H3z"/><path d="M16.5,12c0-1.77-1.02-3.29-2.5-4.03v8.05C15.48,15.29,16.5,13.77,16.5,12z" id="vol-wave1"/><path d="M14,3.23v2.06c2.89,0.86,5,3.54,5,6.71s-2.11,5.85-5,6.71v2.06c4.01-0.91,7-4.49,7-8.77S18.01,4.14,14,3.23z" id="vol-wave2"/><line x1="22.5" y1="6" x2="14" y2="14.5" stroke="#fff" stroke-width="1.8" id="mute-x1" style="display:none"/><line x1="14" y1="6" x2="22.5" y2="14.5" stroke="#fff" stroke-width="1.8" id="mute-x2" style="display:none"/></svg>
          </button>
          <input type="range" class="vs" id="vol-slider" min="0" max="100" value="100" oninput="setVol(this.value)">
        </div>
        <div class="tdisp">
          <span id="cur-t">0:00</span> <span class="sep">/</span> <span id="dur-t">0:00</span>
          <span class="sep">|</span>
          <span class="title-part">Big Buck Bunny</span>
        </div>
      </div>
      <div class="cright">
        <button class="cb" id="cast-btn" title="Cast" onclick="doCast(event)" aria-label="Cast video">
          <svg class="icon-cast" viewBox="0 0 24 24" fill="#fff">
            <path d="M1,18v3h3C4,19.34,2.66,18,1,18z"/>
            <path d="M1,14v2c2.76,0,5,2.24,5,5h2C8,17.13,4.87,14,1,14z"/>
            <path d="M1,10v2c4.97,0,9,4.03,9,9h2C12,14.92,7.07,10,1,10z"/>
            <path d="M21,3H3C1.9,3,1,3.9,1,5v3h2V5h18v14h-7v2h7c1.1,0,2-0.9,2-2V5C23,3.9,22.1,3,21,3z"/>
          </svg>
        </button>
        <button class="cb" id="download-btn" title="Download" onclick="doDownload(event)" aria-label="Download video">
          <svg class="icon-cast" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"/>
            <path d="m7 10 5 5 5-5"/>
            <path d="M5 20h14"/>
          </svg>
        </button>
        <button class="cb" title="Captions" onclick="togPanel('sub-captions',event)">
          <svg class="icon-cc" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2.5" fill="none" stroke="#fff" stroke-width="1.6"/><text x="12" y="15" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle" font-family="Arial,sans-serif">CC</text></svg>
        </button>
        <button class="cb" title="Settings" onclick="togPanel('settings-main',event)">
          <svg class="icon-settings" viewBox="0 0 24 24" fill="#fff">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35c-0.59,0.24-1.13,0.57-1.62,0.94L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87c-0.12,0.21-0.08,0.47,0.12,0.61l2.03,1.58c-0.05,0.3-0.09,0.63-0.09,0.94s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
          </svg>
        </button>
        <button class="cb" id="next-btn" title="Next" onclick="doNext(event)" aria-label="Next" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 5v14"/>
            <path d="m13 12 6-5v10l-6-5z"/>
          </svg>
        </button>
        <button class="cb" title="Picture in Picture" onclick="doPip(event)">
          <svg class="icon-pip" viewBox="0 0 24 24" fill="#fff">
            <path d="M19,7h-8v6h8V7z M21,3H3C1.9,3,1,3.9,1,5v14c0,1.1,0.9,2,2,2h18c1.1,0,2-0.9,2-2V5C23,3.9,22.1,3,21,3z M21,19.02H3V4.98h18V19.02z"/>
          </svg>
        </button>
        <button class="cb" title="Fullscreen" onclick="doFS(event)">
          <svg class="icon-fs" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" id="fs-icon">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script src="/player.js"></script>
</body>
</html>
